apiVersion: apps/v1
kind: Deployment
metadata:
  name: edupath-frontend
  namespace: edupath
  labels:
    app: edupath-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edupath-frontend
  template:
    metadata:
      labels:
        app: edupath-frontend
    spec:
      containers:
        - name: frontend
          image: edupath/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: edupath-frontend
  namespace: edupath
spec:
  selector:
    app: edupath-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
