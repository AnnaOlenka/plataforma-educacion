server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el service worker: debe revalidarse en cada carga.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
